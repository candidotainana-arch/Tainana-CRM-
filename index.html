  const[nome,setNome]=useState("");const[contato,setContato]=useState("");const[email,setEmail]=useState("");
  const[apolices,setApolices]=useState([{numero:"",dataEmissao:""}]);
  const addAp=()=>setApolices(p=>[...p,{numero:"",dataEmissao:""}]);
  const updAp=(i,k,v)=>setApolices(p=>p.map((a,idx)=>idx===i?{...a,[k]:v}:a));
  const delAp=i=>setApolices(p=>p.filter((_,idx)=>idx!==i));
  const valido=nome.trim()&&contato.trim()&&apolices.every(a=>a.numero.trim()&&a.dataEmissao);
  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:460,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
      <div style={{background:"linear-gradient(135deg,#8B1A4A,#C0335A)",color:"#fff",padding:"18px 20px",borderRadius:"16px 16px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:12,opacity:.8}}>Cadastro Manual</div><div style={{fontSize:17,fontWeight:700,marginTop:2}}>👤 Novo Cliente + Apólice</div></div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:16}}>✕</button>
      </div>
      <div style={{padding:18}}>
        <div style={{fontWeight:700,fontSize:13,color:"#8B1A4A",marginBottom:10}}>👤 Dados do Cliente</div>
        <div style={{marginBottom:10}}><label style={{fontSize:12,fontWeight:600,color:"#555",display:"block",marginBottom:3}}>Nome completo *</label><input value={nome} onChange={e=>setNome(e.target.value)} placeholder="Nome do cliente" style={{width:"100%",padding:"9px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:13,boxSizing:"border-box"}}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
          <div><label style={{fontSize:12,fontWeight:600,color:"#555",display:"block",marginBottom:3}}>Telefone *</label><input value={contato} onChange={e=>setContato(e.target.value)} placeholder="(11) 99999-9999" style={{width:"100%",padding:"9px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:13,boxSizing:"border-box"}}/></div>
          <div><label style={{fontSize:12,fontWeight:600,color:"#555",display:"block",marginBottom:3}}>E-mail</label><input value={email} onChange={e=>setEmail(e.target.value)} placeholder="email@exemplo.com" style={{width:"100%",padding:"9px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:13,boxSizing:"border-box"}}/></div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontWeight:700,fontSize:13,color:"#8B1A4A"}}>📋 Apólices</div>
          <button onClick={addAp} style={{background:"#8B1A4A",color:"#fff",border:"none",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12,fontWeight:700}}>＋ Adicionar</button>
        </div>
        {apolices.map((a,i)=>(<div key={i} style={{background:"#fdf0f5",borderRadius:10,padding:"12px 14px",marginBottom:8,border:"1px solid #f0c8d8"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:12,fontWeight:700,color:"#8B1A4A"}}>Apólice {i+1}</span>
            {apolices.length>1&&<button onClick={()=>delAp(i)} style={{background:"#fee2e2",border:"none",color:"#dc2626",borderRadius:4,padding:"2px 8px",cursor:"pointer",fontSize:11}}>🗑️</button>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><label style={{fontSize:12,fontWeight:600,color:"#555",display:"block",marginBottom:3}}>Nº da Apólice *</label><input value={a.numero} onChange={e=>updAp(i,"numero",e.target.value)} placeholder="Ex: 1234567" style={{width:"100%",padding:"8px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:13,boxSizing:"border-box"}}/></div>
            <div><label style={{fontSize:12,fontWeight:600,color:"#555",display:"block",marginBottom:3}}>Data de Emissão *</label><input type="date" value={a.dataEmissao} onChange={e=>updAp(i,"dataEmissao",e.target.value)} style={{width:"100%",padding:"8px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:13,boxSizing:"border-box"}}/></div>
          </div>
        </div>))}
        <button onClick={()=>{if(!valido)return;onSave({nome,contato,email,apolices});onClose();}} disabled={!valido}
          style={{width:"100%",padding:12,background:valido?"#8B1A4A":"#ddd",color:"#fff",border:"none",borderRadius:10,cursor:valido?"pointer":"not-allowed",fontWeight:700,fontSize:15,marginTop:8}}>
          ✅ Cadastrar Cliente
        </button>
      </div>
    </div>
  </div>);
}

// ── AgendaModal ───────────────────────────────────────────────
function AgendaModal({client,onClose,onSave}){
  const[assunto,setAssunto]=useState(null);const[data,setData]=useState("");const[hora,setHora]=useState("10:00");
  const[obs,setObs]=useState("");const[done,setDone]=useState(false);const[salvando,setSalvando]=useState(false);
  const[gcalLink,setGcalLink]=useState(null);const[erro,setErro]=useState(null);
  const aObj=ASSUNTOS.find(a=>a.id===assunto);
  const buildWA=()=>{const df=data?new Date(data+"T12:00:00").toLocaleDateString("pt-BR"):"";return encodeURIComponent(`Olá ${client.nome.split(" ")[0]} 😊\n\nConfirmando reunião:\n📌 *${aObj.icon} ${aObj.label}*\n📅 ${df} às ${hora}${obs?"\n📝 "+obs:""}\n\n_Tainana Candido — Gestão de Riscos TC_`);};
  const buildEmail=()=>{const df=data?new Date(data+"T12:00:00").toLocaleDateString("pt-BR"):"";return `mailto:${client.email}?subject=${encodeURIComponent(aObj.label+" — "+df)}&body=${encodeURIComponent("Olá "+client.nome.split(" ")[0]+",\n\nAssunto: "+aObj.label+"\nData: "+df+"\nHorário: "+hora+(obs?"\nObs: "+obs:"")+"\n\nTainana Candido\nGestão de Riscos TC")}`;};
  const salvar=async()=>{if(!assunto||!data)return;setSalvando(true);setErro(null);try{const[an,ms,di]=data.split("-").map(Number);const[h,m]=hora.split(":").map(Number);const s=new Date(an,ms-1,di,h,m,0),e=new Date(an,ms-1,di,h+1,m,0);const pad=n=>String(n).padStart(2,"0");const fmt=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}:00`;const desc=`Cliente: ${client.nome}\nTel: ${client.contato}${obs?"\nObs: "+obs:""}`;const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,mcp_servers:[{type:"url",url:"https://calendarmcp.googleapis.com/mcp/v1",name:"google-calendar"}],messages:[{role:"user",content:`Create Google Calendar event, reply only with htmlLink URL:\nTitle: ${aObj.icon} ${aObj.label} — ${client.nome}\nStart: ${fmt(s)}\nEnd: ${fmt(e)}\nTimeZone: America/Sao_Paulo\nDescription: ${desc}\nAdd popup reminder 30 min before.`}]})});const json=await res.json();const text=json.content?.filter(b=>b.type==="text").map(b=>b.text).join("").trim();setGcalLink(text.match(/https?:\/\/[^\s"]+/)?.[0]||null);onSave({cliente:client.nome,contato:client.contato,email:client.email,assunto,data,hora,obs});setDone(true);}catch(e){setErro("Erro ao criar evento.");}finally{setSalvando(false);}};
  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:420,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
      <div style={{background:"linear-gradient(135deg,#8B1A4A,#C0335A)",color:"#fff",padding:"18px 20px",borderRadius:"16px 16px 0 0",display:"flex",justifyContent:"space-between"}}>
        <div><div style={{fontSize:12,opacity:.8}}>Agendar Reunião</div><div style={{fontSize:16,fontWeight:700,marginTop:2}}>{client.nome}</div></div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:16}}>✕</button>
      </div>
      <div style={{padding:20}}>{!done?(<>
        <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>Assunto</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>{ASSUNTOS.map(a=>(<button key={a.id} onClick={()=>setAssunto(a.id)} style={{padding:"10px 8px",border:`2px solid ${assunto===a.id?a.cor:"#e5e7eb"}`,borderRadius:10,background:assunto===a.id?a.cor+"18":"#fafafa",cursor:"pointer",textAlign:"center"}}><div style={{fontSize:18,marginBottom:3}}>{a.icon}</div><div style={{fontSize:11,fontWeight:600,color:assunto===a.id?a.cor:"#555"}}>{a.label}</div></button>))}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div><label style={{fontSize:12,fontWeight:600,color:"#555",display:"block",marginBottom:4}}>Data</label><input type="date" value={data} onChange={e=>setData(e.target.value)} style={{width:"100%",padding:"9px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:13,boxSizing:"border-box"}}/></div>
          <div><label style={{fontSize:12,fontWeight:600,color:"#555",display:"block",marginBottom:4}}>Horário</label><input type="time" value={hora} onChange={e=>setHora(e.target.value)} style={{width:"100%",padding:"9px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:13,boxSizing:"border-box"}}/></div>
        </div>
        <div style={{marginBottom:16}}><label style={{fontSize:12,fontWeight:600,color:"#555",display:"block",marginBottom:4}}>Observações</label><textarea value={obs} onChange={e=>setObs(e.target.value)} rows={2} style={{width:"100%",padding:"9px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:13,resize:"vertical",boxSizing:"border-box"}}/></div>
        {assunto&&data?(<div style={{display:"flex",flexDirection:"column",gap:8}}>
          <a href={`https://wa.me/55${phoneNum(client.contato)}?text=${buildWA()}`} target="_blank" style={{display:"flex",alignItems:"center",gap:10,padding:"11px 16px",background:"#25D366",color:"#fff",borderRadius:10,textDecoration:"none",fontWeight:600,fontSize:14}}>💬 WhatsApp</a>
          <a href={buildEmail()} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 16px",background:"#8B1A4A",color:"#fff",borderRadius:10,textDecoration:"none",fontWeight:600,fontSize:14}}>📧 E-mail</a>
          <button onClick={salvar} disabled={salvando} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 16px",background:salvando?"#ccc":"#059669",color:"#fff",borderRadius:10,border:"none",cursor:salvando?"not-allowed":"pointer",fontWeight:600,fontSize:14,justifyContent:"center"}}>{salvando?"⏳ Salvando...":"✅ Salvar no Google Calendar"}</button>
          {erro&&<div style={{color:"#dc2626",fontSize:12,textAlign:"center"}}>{erro}</div>}
        </div>):(<div style={{textAlign:"center",fontSize:12,color:"#aaa",padding:8}}>Selecione o assunto e a data para continuar</div>)}
      </>):(<div style={{textAlign:"center",padding:"20px 0"}}>
        <div style={{fontSize:48,marginBottom:12}}>✅</div>
        <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>Reunião agendada!</div>
        <div style={{fontSize:13,color:"#666",marginBottom:16}}>{client.nome} · {data.split("-").reverse().join("/")} às {hora}</div>
        {gcalLink&&<a href={gcalLink} target="_blank" style={{display:"inline-block",background:"#4285F4",color:"#fff",padding:"8px 18px",borderRadius:8,textDecoration:"none",fontSize:13,fontWeight:600,marginBottom:12}}>📅 Ver no Google Calendar</a>}
        <br/><button onClick={onClose} style={{background:"#8B1A4A",color:"#fff",border:"none",borderRadius:10,padding:"10px 24px",cursor:"pointer",fontWeight:600,marginTop:8}}>Fechar</button>
      </div>)}</div>
    </div>
  </div>);
}

// ── Main CRM ──────────────────────────────────────────────────
function CRM(){
  const[search,setSearch]=useState("");const[tab,setTab]=useState("lista");const[sortBy,setSortBy]=useState("nome");
  const[selected,setSelected]=useState(null);const[filterMulti,setFilterMulti]=useState(false);
  const[agendando,setAgendando]=useState(null);const[verAgendamentos,setVerAgendamentos]=useState(false);
  const[agendamentos,setAgendamentos]=useState([]);const[anoSel,setAnoSel]=useState(null);
  const[historico,setHistorico]=useState({});const[verHistorico,setVerHistorico]=useState(null);
  const[prospectos,setProspectos]=useState([]);const[verProspecto,setVerProspecto]=useState(null);
  const[novoProspecto,setNovoProspecto]=useState(false);
  const[novoCliente,setNovoCliente]=useState(false);
  const[clientesExtra,setClientesExtra]=useState([]);

  const todosClientes=useMemo(()=>{
    const extras=clientesExtra.map(c=>({
      nome:c.nome.toUpperCase(),contato:c.contato,email:c.email,
      apolices:c.apolices.map(a=>({apolice:a.numero,nome:c.nome.toUpperCase(),contato:c.contato,email:c.email,dataEmissao:a.dataEmissao.split("-").reverse().join("/"),dataObj:new Date(a.dataEmissao)})),
      totalApolices:c.apolices.length,ultimaEmissao:c.apolices[0]?.dataEmissao.split("-").reverse().join("/")||"",
      ultimaData:c.apolices[0]?new Date(c.apolices[0].dataEmissao):null,manual:true
    }));
    return[...uniqueClients,...extras].sort((a,b)=>a.nome.localeCompare(b.nome));
  },[clientesExtra]);

  const todosAgendamentos=useMemo(()=>{
    const dp=prospectos.filter(p=>p.dataAgendamento).map(p=>({cliente:p.nome,contato:p.telefone,email:p.email||"",assunto:p.assuntoAgendamento||"apresentacao",data:p.dataAgendamento,hora:p.horaAgendamento||"10:00",obs:p.obs||"",origem:"prospecto"}));
    return[...agendamentos.map(a=>({...a,origem:"cliente"})),...dp];
  },[agendamentos,prospectos]);

  const filtered=useMemo(()=>{
    let res=todosClientes;
    if(search.trim()){const q=search.toLowerCase();res=res.filter(c=>c.nome.toLowerCase().includes(q)||c.contato.includes(q)||c.email.toLowerCase().includes(q)||c.apolices.some(a=>a.apolice.includes(q)));}
    if(filterMulti)res=res.filter(c=>c.totalApolices>1);
    if(sortBy==="nome")res=[...res].sort((a,b)=>a.nome.localeCompare(b.nome));
    if(sortBy==="data")res=[...res].sort((a,b)=>(b.ultimaData||0)-(a.ultimaData||0));
    if(sortBy==="qtd")res=[...res].sort((a,b)=>b.totalApolices-a.totalApolices);
    return res;
  },[search,sortBy,filterMulti,todosClientes]);

  const handleDeleteAg=i=>{const ag=todosAgendamentos[i];if(!ag)return;if(ag.origem==="cliente"){setAgendamentos(prev=>prev.filter(a=>!(a.cliente===ag.cliente&&a.data===ag.data&&a.hora===ag.hora)));}else{setProspectos(prev=>prev.map(p=>p.nome===ag.cliente?{...p,dataAgendamento:"",horaAgendamento:"10:00"}:p));}};

  const fazerBackup=()=>{
    const dados={exportadoEm:new Date().toLocaleString("pt-BR"),versao:"1.0",agendamentos,historico,prospectos,clientesExtra};
    const blob=new Blob([JSON.stringify(dados,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download=`backup-crm-${new Date().toISOString().split("T")[0]}.json`;a.click();URL.revokeObjectURL(url);
  };

  return(<div style={{fontFamily:"Inter,sans-serif",background:"#f8f9fc",minHeight:"100vh"}}>
    {novoCliente&&<ClienteModal onClose={()=>setNovoCliente(false)} onSave={c=>setClientesExtra(prev=>[...prev,{...c,id:Date.now()}])}/>}
    {novoProspecto&&<ProspectoModal onClose={()=>setNovoProspecto(false)} onSave={p=>setProspectos(prev=>[...prev,{...p,id:Date.now()}])}/>}
    {verProspecto&&<ProspectoModal prospecto={verProspecto} onClose={()=>setVerProspecto(null)} onSave={p=>setProspectos(prev=>prev.map(x=>x.id===verProspecto.id?{...p,id:verProspecto.id}:x))}/>}
    {agendando&&<AgendaModal client={agendando} onClose={()=>setAgendando(null)} onSave={ag=>setAgendamentos(prev=>[...prev,ag])}/>}
    {verAgendamentos&&<AgendamentosModal agendamentos={todosAgendamentos} onClose={()=>setVerAgendamentos(false)} onDelete={handleDeleteAg}/>}
    {verHistorico&&<HistoricoModal client={verHistorico} historico={historico} onClose={()=>setVerHistorico(null)} onSave={(nome,reg)=>setHistorico(prev=>({...prev,[nome]:[...(prev[nome]||[]),reg]}))} onDelete={(nome,idx)=>setHistorico(prev=>({...prev,[nome]:prev[nome].filter((_,i)=>i!==idx)}))}/>}

    {/* Header */}
    <div style={{background:"linear-gradient(135deg,#8B1A4A,#C0335A)",color:"#fff",padding:"20px 24px 16px"}}>
      <div style={{fontSize:13,opacity:.8,marginBottom:4}}>Gestão de Riscos TC</div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontSize:22,fontWeight:700}}>CRM — Clientes Ativos</div>

          <button onClick={()=>setVerAgendamentos(true)} style={{background:"rgba(255,255,255,.2)",border:"1.5px solid rgba(255,255,255,.5)",color:"#fff",borderRadius:10,padding:"8px 14px",cursor:"pointer",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>
            📅 {todosAgendamentos.length>0&&<span style={{background:"#fff",color:"#8B1A4A",borderRadius:10,padding:"1px 7px",fontSize:11,fontWeight:800}}>{todosAgendamentos.length}</span>}
          </button>
          <button onClick={fazerBackup} style={{background:"rgba(255,255,255,.2)",border:"1.5px solid rgba(255,255,255,.5)",color:"#fff",borderRadius:10,padding:"8px 14px",cursor:"pointer",fontSize:13,fontWeight:700}}>💾 Backup</button>
        </div>
      </div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
        {[[totalApolices+clientesExtra.reduce((s,c)=>s+c.apolices.length,0),"Apólices"],[totalClientes+clientesExtra.length,"Clientes"],[multiApolice,"Multi-apólice"],[emissoes2026,"Emissões 2026"]].map(([v,l])=>(<div key={l} style={{background:"rgba(255,255,255,.15)",borderRadius:10,padding:"8px 16px",textAlign:"center"}}><div style={{fontSize:22,fontWeight:700}}>{v}</div><div style={{fontSize:11,opacity:.85}}>{l}</div></div>))}

          <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>Emissões por Ano</div>
          <div style={{fontSize:12,color:"#888",marginBottom:14}}>Clique em um ano para ver os clientes</div>
          {anos.map(ano=>{const cd=anoSel===ano?records.filter(r=>r.dataObj&&String(r.dataObj.getFullYear())===ano).sort((a,b)=>(b.dataObj||0)-(a.dataObj||0)):[];return(<div key={ano} style={{marginBottom:10,cursor:"pointer"}} onClick={()=>setAnoSel(anoSel===ano?null:ano)}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4,alignItems:"center"}}><span style={{fontWeight:700,color:anoSel===ano?"#8B1A4A":"#333"}}>{ano}</span><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{color:"#888",fontSize:12}}>{porAno[ano]} apólices</span><span style={{fontSize:11,color:anoSel===ano?"#8B1A4A":"#aaa"}}>{anoSel===ano?"▲":"▼"}</span></div></div>
            <div style={{background:"#f0f0f0",borderRadius:6,height:16,overflow:"hidden"}}><div style={{width:`${(porAno[ano]/maxAno)*100}%`,background:anoSel===ano?"linear-gradient(90deg,#8B1A4A,#C0335A)":"linear-gradient(90deg,#ccc,#bbb)",borderRadius:6,height:16}}/></div>
            {anoSel===ano&&(<div style={{marginTop:10,borderLeft:"3px solid #8B1A4A",paddingLeft:12}}>{cd.map((r,i)=>{const cO=todosClientes.find(c=>c.nome===r.nome.toUpperCase());return(<div key={r.apolice+i} style={{background:"#fdf0f5",borderRadius:8,padding:"8px 12px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
              <div><div style={{fontWeight:600,fontSize:13,color:"#8B1A4A"}}>{r.nome}</div><div style={{fontSize:11,color:"#888"}}>#{r.apolice} · {r.dataEmissao} · {r.contato}</div></div>
              <div style={{display:"flex",gap:6}}><a href={`https://wa.me/55${phoneNum(r.contato)}`} target="_blank" style={{background:"#25D366",color:"#fff",padding:"4px 10px",borderRadius:6,textDecoration:"none",fontSize:11,fontWeight:600}}>💬</a>{cO&&<button onClick={e=>{e.stopPropagation();setAgendando(cO);}} style={{background:"#4285F4",color:"#fff",border:"none",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:600}}>📅</button>}</div>
            </div>);})}}</div>)}
          </div>);})}
        </div>
        <div style={{padding:16,background:"#fff",borderRadius:12,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}><div style={{fontWeight:600,marginBottom:8,color:"#8B1A4A"}}>Resumo</div><div style={{fontSize:13,color:"#555",lineHeight:1.9}}>📋 Total de apólices: <strong>{totalApolices}</strong><br/>👥 Clientes únicos: <strong>{totalClientes}</strong><br/>🔄 Multi-apólice: <strong>{multiApolice}</strong> ({Math.round(multiApolice/totalClientes*100)}%)<br/>📅 Novas em 2025: <strong>{emissoes2025}</strong><br/>🆕 Novas em 2026: <strong>{emissoes2026}</strong></div></div>
      </div>)}

      {/* ANIVERSÁRIOS */}
      {tab==="apolices"&&(<div>
        <div style={{background:"#fff",borderRadius:12,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,.06)",marginBottom:12}}><div style={{fontWeight:700,fontSize:15,marginBottom:4}}>🔔 Aniversários de Apólice — Próximos 30 dias</div><div style={{fontSize:12,color:"#888"}}>Oportunidades de contato e revisão</div></div>
        {proximos30.length===0?(<div style={{textAlign:"center",color:"#aaa",padding:32}}>Nenhum aniversário nos próximos 30 dias</div>):[...proximos30].sort((a,b)=>{const da=new Date(anoAtual,a.dataObj.getMonth(),a.dataObj.getDate());const db=new Date(anoAtual,b.dataObj.getMonth(),b.dataObj.getDate());if(da<hoje)da.setFullYear(anoAtual+1);if(db<hoje)db.setFullYear(anoAtual+1);return da-db;}).map(r=>{const aniv=new Date(anoAtual,r.dataObj.getMonth(),r.dataObj.getDate());if(aniv<hoje)aniv.setFullYear(anoAtual+1);const diff=Math.round((aniv-hoje)/(1000*60*60*24));const cO=todosClientes.find(c=>c.nome===r.nome.toUpperCase());return(<div key={r.apolice} style={{background:"#fff",borderRadius:10,padding:"12px 16px",marginBottom:8,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}><div><div style={{fontWeight:600,fontSize:13}}>{r.nome}</div><div style={{fontSize:12,color:"#888"}}>Apólice #{r.apolice} · {r.dataEmissao}</div></div><span style={{background:diff<=7?"#8B1A4A":"#f0e6ec",color:diff<=7?"#fff":"#8B1A4A",borderRadius:12,padding:"3px 10px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{diff===0?"Hoje":diff===1?"Amanhã":`${diff} dias`}</span></div>
          <div style={{display:"flex",gap:6}}><a href={`https://wa.me/55${phoneNum(r.contato)}`} target="_blank" style={{background:"#25D366",color:"#fff",padding:"5px 10px",borderRadius:6,textDecoration:"none",fontSize:11,fontWeight:600}}>💬 WhatsApp</a>{cO&&<button onClick={()=>setAgendando(cO)} style={{background:"#4285F4",color:"#fff",border:"none",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:11,fontWeight:600}}>📅 Agendar</button>}</div>
        </div>);})}
      </div>)}

      {/* PROSPECÇÃO */}
      {tab==="prospeccao"&&(<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><div><div style={{fontWeight:700,fontSize:16}}>🎯 Prospecção</div><div style={{fontSize:12,color:"#888"}}>{prospectos.length} lead(s)</div></div><button onClick={()=>setNovoProspecto(true)} style={{background:"#d97706",color:"#fff",border:"none",borderRadius:10,padding:"9px 16px",cursor:"pointer",fontWeight:700,fontSize:13}}>＋ Novo Lead</button></div>
        {prospectos.length>0&&(<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>{STATUS_LIST.map(s=>{const qtd=prospectos.filter(p=>p.status===s.id).length;if(!qtd)return null;return<div key={s.id} style={{background:s.cor+"18",border:`1.5px solid ${s.cor}33`,borderRadius:10,padding:"5px 10px",fontSize:11,fontWeight:700,color:s.cor}}>{s.icon} {s.label}: {qtd}</div>;})}</div>)}
        {prospectos.length===0?(<div style={{textAlign:"center",padding:"48px 16px",background:"#fff",borderRadius:12,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}><div style={{fontSize:48,marginBottom:12}}>🎯</div><div style={{fontWeight:700,fontSize:16,marginBottom:6}}>Nenhum lead cadastrado</div><div style={{fontSize:13,color:"#888",marginBottom:16}}>Cadastre seu primeiro prospecto</div><button onClick={()=>setNovoProspecto(true)} style={{background:"#d97706",color:"#fff",border:"none",borderRadius:10,padding:"10px 24px",cursor:"pointer",fontWeight:700,fontSize:14}}>＋ Cadastrar Primeiro Lead</button></div>):prospectos.map(p=>{const st=STATUS_LIST.find(s=>s.id===p.status)||STATUS_LIST[0];const assObj=ASSUNTOS.find(a=>a.id===p.assuntoAgendamento);return(<div key={p.id} style={{background:"#fff",borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 4px rgba(0,0,0,.07)",borderLeft:`4px solid ${st.cor}`,marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}><div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,marginBottom:2}}>{p.nome}</div><div style={{fontSize:12,color:"#888"}}>📱 {p.telefone}{p.email&&` · ✉️ ${p.email}`}</div>{p.origem&&<div style={{fontSize:11,color:"#aaa",marginTop:1}}>Origem: {p.origem}{p.interesse?` · ${p.interesse}`:""}</div>}</div><span style={{background:st.cor,color:"#fff",borderRadius:8,padding:"3px 9px",fontSize:11,fontWeight:700,whiteSpace:"nowrap",marginLeft:8}}>{st.icon} {st.label}</span></div>
          {p.dataAgendamento&&<div style={{background:"#fff8ed",borderRadius:8,padding:"6px 10px",fontSize:12,color:"#92400e",marginBottom:8}}>📅 {new Date(p.dataAgendamento+"T12:00:00").toLocaleDateString("pt-BR")} às {p.horaAgendamento}{assObj&&` · ${assObj.icon} ${assObj.label}`}</div>}
          {p.obs&&<div style={{fontSize:12,color:"#555",marginBottom:8,fontStyle:"italic"}}>"{p.obs}"</div>}
          {(p.historico||[]).length>0&&<div style={{fontSize:11,color:"#888",marginBottom:8}}>📋 {p.historico.length} interação(ões)</div>}
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            <a href={`https://wa.me/55${p.telefone.replace(/\D/g,"")}`} target="_blank" style={{background:"#25D366",color:"#fff",padding:"5px 10px",borderRadius:6,textDecoration:"none",fontSize:11,fontWeight:600}}>💬</a>
            {p.email&&<a href={`mailto:${p.email}`} style={{background:"#8B1A4A",color:"#fff",padding:"5px 10px",borderRadius:6,textDecoration:"none",fontSize:11,fontWeight:600}}>📧</a>}
            <button onClick={()=>setVerProspecto(p)} style={{background:"#d97706",color:"#fff",border:"none",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:11,fontWeight:600}}>✏️ Editar</button>
            <button onClick={()=>setProspectos(prev=>prev.filter(x=>x.id!==p.id))} style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:11,fontWeight:600}}>🗑️</button>
          </div>
        </div>);})}
      </div>)}

    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<CRM/>);
</script>
</body>
</html>
